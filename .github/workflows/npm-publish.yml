name: npm-publish
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  npm-publish:
    name: npm-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test
      - name: Build package
        run: npm run build
      - name: Publish package
        run: npm publish --access public
